<div class="register-wrapper">
  <mat-card class="register-card">

    <mat-card-header>
      <div class="logo">
        <h1>Task<span>Flow</span></h1>
        <p>Crie sua conta gratuitamente</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="cadastrar()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="nome"
                 placeholder="Seu nome completo">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="nome?.hasError('required')">
            Nome é obrigatório
          </mat-error>
          <mat-error *ngIf="nome?.hasError('minlength')">
            Mínimo 2 caracteres
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email"
                 type="email" placeholder="seu@email.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="email?.hasError('required')">
            Email é obrigatório
          </mat-error>
          <mat-error *ngIf="email?.hasError('email')">
            Email inválido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="senha"
                 [type]="senhaVisivel ? 'text' : 'password'"
                 placeholder="Mínimo 6 caracteres">
          <button mat-icon-button matSuffix type="button"
                  (click)="senhaVisivel = !senhaVisivel">
            <mat-icon>
              {{ senhaVisivel ? 'visibility_off' : 'visibility' }}
            </mat-icon>
          </button>
          <mat-error *ngIf="senha?.hasError('required')">
            Senha é obrigatória
          </mat-error>
          <mat-error *ngIf="senha?.hasError('minlength')">
            Mínimo 6 caracteres
          </mat-error>
        </mat-form-field>

        <div class="erro-msg" *ngIf="erro">{{ erro }}</div>

        <button mat-raised-button color="primary"
                type="submit" class="full-width btn-cadastrar"
                [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Criar conta</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="login-link">
        Já tem conta?
        <a routerLink="/login">Entrar</a>
      </p>
    </mat-card-actions>

  </mat-card>
</div>
