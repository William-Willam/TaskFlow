<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo">
        <h1>Task<span>Flow</span></h1>
        <p>Gerencie seus projetos e tarefas</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="entrar()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="seu@email.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="email?.hasError('required')">Email é obrigatório</mat-error>
          <mat-error *ngIf="email?.hasError('email')">Email inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="senha"
                 [type]="senhaVisivel ? 'text' : 'password'"
                 placeholder="••••••••">
          <button mat-icon-button matSuffix type="button"
                  (click)="senhaVisivel = !senhaVisivel">
            <mat-icon>{{ senhaVisivel ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="senha?.hasError('required')">Senha é obrigatória</mat-error>
          <mat-error *ngIf="senha?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
        </mat-form-field>

        <div class="erro-msg" *ngIf="erro">{{ erro }}</div>

        <button mat-raised-button color="primary" type="submit"
                class="full-width btn-entrar" [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Entrar</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="cadastro-link">
        Não tem conta?
        <a routerLink="/register">Cadastre-se</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
